<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>상급종합병원 접근성 · 고령화 지도</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="config.js" onerror="window.MAP_KEYS=window.MAP_KEYS||{}"></script>
<style>
  :root{
    --bg:#ffffff;--ink:#111111;--muted:#6b7280;--line:#e5e7eb;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:var(--font);color:var(--ink);background:var(--bg)}
  #app{display:flex;flex-direction:column;height:100%}
  .topbar{height:56px;flex:0 0 56px;display:flex;align-items:center;gap:14px;
    padding:0 20px;border-bottom:1px solid var(--line);background:#fff;z-index:5}
  .topbar h1{font-size:15px;font-weight:700;margin:0;letter-spacing:-.2px;white-space:nowrap}
  .topbar .spacer{flex:1}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:7px 12px;font-size:12.5px;cursor:pointer;
    color:#444;font-family:inherit;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:#111;color:#fff;font-weight:600}
  .badge{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 8px;white-space:nowrap}
  #map{flex:1;position:relative}
  .panel{position:absolute;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .ctrl{right:16px;top:16px;padding:11px 12px;font-size:12px;min-width:172px}
  .ctrl .grp{margin-bottom:9px}
  .ctrl .grp:last-child{margin-bottom:0}
  .ctrl label.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .ctrl select{width:100%;font-family:inherit;font-size:12.5px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;color:#111}
  .ctrl .chk{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12.5px}
  .ctrl .op{display:flex;align-items:center;gap:8px;color:var(--muted);margin-top:7px}
  .ctrl input[type=range]{width:90px;accent-color:#111}
  .legend{left:16px;bottom:16px;padding:12px 14px;max-width:240px}
  .legend h2{font-size:12px;margin:0 0 9px;font-weight:700}
  .legend .row{display:flex;align-items:center;gap:8px;font-size:12px;margin:4px 0;color:#222}
  .legend .sw{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,.10);flex:0 0 14px}
  .legend .note{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.5}
  .bivar-grid{display:grid;grid-template-columns:auto repeat(3,20px);grid-template-rows:auto repeat(3,20px);gap:2px;align-items:center;margin:2px 0 4px}
  .bivar-grid .cell{width:20px;height:20px;border-radius:2px}
  .bivar-grid .axt{font-size:10px;color:var(--muted)}
  .bivar-grid .yl{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10px;color:var(--muted);justify-self:center}
  .maplibregl-popup-content{font-family:var(--font);border-radius:8px;border:1px solid var(--line);box-shadow:0 4px 14px rgba(0,0,0,.10);padding:9px 11px}
  .pop-name{font-weight:700;font-size:13px}.pop-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .pop-k{color:var(--muted)}.pop-v{font-weight:600}
  .toast{position:absolute;left:50%;top:14px;transform:translateX(-50%);background:#111;color:#fff;font-size:12px;
    padding:7px 12px;border-radius:8px;display:none;z-index:9;max-width:80%}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>상급종합병원 접근성 · 고령화</h1>
    <div class="seg" id="view-seg">
      <button data-view="iso" class="on">접근성 등시선</button>
      <button data-view="bivar">접근성×고령화</button>
      <button data-view="aging">고령화지수</button>
      <button data-view="here">여기서 등시선</button>
    </div>
    <span class="spacer"></span>
    <span class="badge" id="badge-hosp">병원 47개소 · 제5기</span>
    <span class="badge" id="badge-ctx">자동차 운전</span>
  </div>
  <div id="map">
    <div class="panel ctrl">
      <div class="grp">
        <label class="lbl">배경지도</label>
        <select id="basemap">
          <option value="carto-positron">밝은 지도 (CARTO)</option>
          <option value="carto-voyager">기본 지도 (CARTO)</option>
          <option value="carto-dark">어두운 지도 (CARTO)</option>
          <option value="vworld-base">VWorld 일반</option>
          <option value="vworld-gray">VWorld 회색</option>
          <option value="vworld-satellite">VWorld 위성+라벨</option>
        </select>
      </div>
      <div class="grp">
        <label class="chk"><input type="checkbox" id="toggle-hosp" checked /> 병원 위치 표시</label>
        <div class="op"><span>채움 투명도</span><input type="range" id="opacity" min="20" max="95" value="60" /></div>
      </div>
    </div>
    <div class="panel legend" id="legend"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>
<script>
const KEYS = window.MAP_KEYS || {};
const ISO_COLORS = {15:'#1a9850',30:'#a6d96a',45:'#fee08b',60:'#fc8d59'};
// 3x3 바이베리엇 팔레트 (A=고령화 1→3, B=접근성 1좋음→3나쁨). A3B3=최취약(짙음)
const BIVAR = {
  A1B1:'#e8e8e8',A1B2:'#dfb0d6',A1B3:'#be64ac',
  A2B1:'#ace4e4',A2B2:'#a5add3',A2B3:'#8c62aa',
  A3B1:'#5ac8c8',A3B2:'#5698b9',A3B3:'#3b4994'
};
const AGING = ['#fff7ec','#fdd49e','#fc8d59','#d7301f']; // 4단계 순차

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',4200);}

/* ---------- 배경지도 ---------- */
function vworldStyle(layer, hybrid){
  const k=KEYS.vworld;
  const u=l=>`https://api.vworld.kr/req/wmts/1.0.0/${k}/${l}/{z}/{y}/{x}.${l==='Satellite'?'jpeg':'png'}`;
  const sources={vw:{type:'raster',tiles:[u(layer)],tileSize:256,attribution:'© VWorld'}};
  const layers=[{id:'vw',type:'raster',source:'vw'}];
  if(hybrid){sources.vwh={type:'raster',tiles:[u('Hybrid')],tileSize:256};
    layers.push({id:'vwh',type:'raster',source:'vwh'});}
  return {version:8,glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',sources,layers};
}
const CARTO=n=>`https://basemaps.cartocdn.com/gl/${n}/style.json`;
function basemapStyle(id){
  switch(id){
    case 'carto-voyager': return CARTO('voyager-gl-style');
    case 'carto-dark': return CARTO('dark-matter-gl-style');
    case 'vworld-base': return KEYS.vworld?vworldStyle('Base',false):null;
    case 'vworld-gray': return KEYS.vworld?vworldStyle('gray',false):null;
    case 'vworld-satellite': return KEYS.vworld?vworldStyle('Satellite',true):null;
    default: return CARTO('positron-gl-style');
  }
}

/* ---------- 상태/데이터 ---------- */
let DATA={iso:null,sgg:null,hosp:null,hasBivar:false};
let view='iso';
let map;
let clickMarker=null, clickBusy=false;

async function loadData(){
  const get=async u=>{try{const r=await fetch(u);return r.ok?await r.json():null;}catch(e){return null;}};
  DATA.hosp=await get('data/hospitals.geojson');
  DATA.iso =await get('data/isochrones.geojson');
  const bv =await get('data/sigungu_bivariate.geojson');
  DATA.hasBivar=!!bv;
  DATA.sgg = bv || await get('data/sigungu.geojson');
}

/* 스타일(배경지도) 로드 시마다 데이터 레이어 재구성 */
function addAppLayers(){
  if(!map.getStyle()) return;
  // 심볼 라벨 아래에 채움 삽입(있으면)
  let before;
  for(const l of map.getStyle().layers){ if(l.type==='symbol'){before=l.id;break;} }

  if(DATA.sgg && !map.getSource('sgg')) map.addSource('sgg',{type:'geojson',data:DATA.sgg});
  if(DATA.iso && !map.getSource('iso')) map.addSource('iso',{type:'geojson',data:DATA.iso});
  if(DATA.hosp && !map.getSource('hosp')) map.addSource('hosp',{type:'geojson',data:DATA.hosp});

  const op=document.getElementById('opacity').value/100;

  // 고령화 단순 코로플레스
  if(DATA.sgg && !map.getLayer('sgg-aging')){
    map.addLayer({id:'sgg-aging',type:'fill',source:'sgg',layout:{visibility:'none'},
      paint:{'fill-color':['step',['get','aging_index'],
        AGING[0],150,AGING[1],250,AGING[2],400,AGING[3]],'fill-opacity':op}},before);
  }
  // 바이베리엇
  if(DATA.sgg && DATA.hasBivar && !map.getLayer('sgg-bivar')){
    const m=['match',['get','bivar_class']];
    Object.entries(BIVAR).forEach(([k,v])=>m.push(k,v));
    m.push('#e8e8e8');
    map.addLayer({id:'sgg-bivar',type:'fill',source:'sgg',layout:{visibility:'none'},
      paint:{'fill-color':m,'fill-opacity':op}},before);
  }
  // 시군구 경계선(고령화/바이베리엇 공용)
  if(DATA.sgg && !map.getLayer('sgg-line')){
    map.addLayer({id:'sgg-line',type:'line',source:'sgg',layout:{visibility:'none'},
      paint:{'line-color':'rgba(0,0,0,0.22)','line-width':0.4}},before);
  }
  // 등시선
  if(DATA.iso && !map.getLayer('iso-fill')){
    map.addLayer({id:'iso-fill',type:'fill',source:'iso',
      paint:{'fill-color':['match',['get','minutes'],15,ISO_COLORS[15],30,ISO_COLORS[30],
        45,ISO_COLORS[45],60,ISO_COLORS[60],'#cccccc'],'fill-opacity':op}},before);
    map.addLayer({id:'iso-line',type:'line',source:'iso',
      paint:{'line-color':'rgba(0,0,0,0.16)','line-width':0.4}},before);
  }
  // 클릭형 등시선(빈 소스로 시작, 클릭 시 setData)
  if(!map.getSource('clickiso')) map.addSource('clickiso',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  if(!map.getLayer('clickiso-fill')){
    map.addLayer({id:'clickiso-fill',type:'fill',source:'clickiso',layout:{visibility:'none'},
      paint:{'fill-color':['match',['get','minutes'],15,ISO_COLORS[15],30,ISO_COLORS[30],
        45,ISO_COLORS[45],60,ISO_COLORS[60],'#cccccc'],'fill-opacity':op}},before);
    map.addLayer({id:'clickiso-line',type:'line',source:'clickiso',layout:{visibility:'none'},
      paint:{'line-color':'rgba(0,0,0,0.16)','line-width':0.5}},before);
  }
  // 병원 포인트
  if(DATA.hosp && !map.getLayer('hosp-pt')){
    map.addLayer({id:'hosp-pt',type:'circle',source:'hosp',
      paint:{'circle-radius':['interpolate',['linear'],['zoom'],6,3,10,6],
        'circle-color':'#111','circle-stroke-color':'#fff','circle-stroke-width':1.3}});
    map.addLayer({id:'hosp-label',type:'symbol',source:'hosp',minzoom:8.5,
      layout:{'text-field':['get','name'],'text-size':11,'text-offset':[0,1.1],'text-anchor':'top',
        'text-font':['Open Sans Regular','Noto Sans Regular']},
      paint:{'text-color':'#111','text-halo-color':'#fff','text-halo-width':1.4}});
  }
  applyView();
  applyHospToggle();
}

function setVis(id,v){ if(map.getLayer(id)) map.setLayoutProperty(id,'visibility',v?'visible':'none'); }

function applyView(){
  const isoOn=view==='iso', agingOn=view==='aging', bivOn=view==='bivar', hereOn=view==='here';
  setVis('iso-fill',isoOn);setVis('iso-line',isoOn);
  setVis('sgg-aging',agingOn);
  setVis('sgg-bivar',bivOn);
  setVis('sgg-line',agingOn||bivOn);
  setVis('clickiso-fill',hereOn);setVis('clickiso-line',hereOn);
  if(bivOn && !DATA.hasBivar){
    toast('바이베리엇 데이터가 없습니다. ORS로 등시선 생성 후 combine_bivariate.py를 실행하세요.');
  }
  if(isoOn && !DATA.iso){
    toast('등시선 데이터가 없습니다. fetch_isochrones.py(ORS 키)를 먼저 실행하세요.');
  }
  if(hereOn) toast('지도를 클릭하면 그 지점에서의 자동차 등시선을 그립니다');
  renderLegend();
}
function applyHospToggle(){
  const on=document.getElementById('toggle-hosp').checked;
  setVis('hosp-pt',on);setVis('hosp-label',on);
}

/* ---------- 범례 ---------- */
function renderLegend(){
  const el=document.getElementById('legend');
  if(view==='iso'){
    el.innerHTML=`<h2>가장 가까운 상급종합병원까지 운전 시간</h2>
      ${row(ISO_COLORS[15],'15분 이내')}${row(ISO_COLORS[30],'15–30분')}
      ${row(ISO_COLORS[45],'30–45분')}${row(ISO_COLORS[60],'45–60분')}
      ${row('#ffffff','60분 초과 · 의료 사각지대',true)}
      <div class="note">도로망 OpenRouteService(OSM) · 보건복지부 제5기 명단</div>`;
  }else if(view==='aging'){
    el.innerHTML=`<h2>고령화지수 (65세↑ / 0–14세 ×100)</h2>
      ${row(AGING[0],'~150 (낮음)')}${row(AGING[1],'150–250')}
      ${row(AGING[2],'250–400')}${row(AGING[3],'400+ (높음)')}
      <div class="note">시군구 단위 · KOSIS 주민등록 2025.12</div>`;
  }else if(view==='here'){
    el.innerHTML=`<h2>클릭 지점 기준 운전 등시선</h2>
      ${row(ISO_COLORS[15],'15분 이내')}${row(ISO_COLORS[30],'15–30분')}
      ${row(ISO_COLORS[45],'30–45분')}${row(ISO_COLORS[60],'45–60분')}
      <button id="clickiso-clear" style="margin-top:9px;width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;color:#111;font-family:inherit;font-size:12px;padding:6px;cursor:pointer">지우기</button>
      <div class="note">지도를 클릭하면 그 지점 기준 자동차 등시선을 그립니다 · OpenRouteService(OSM)</div>`;
    el.querySelector('#clickiso-clear').onclick=clearClickIso;
  }else{
    el.innerHTML=`<h2>접근성 × 고령화 (시군구)</h2>${bivarLegend()}
      <div class="note">짙은 우상단 = 고령화 높고 병원 접근성 나쁜 <b>의료 취약지</b></div>`;
  }
}
function row(c,t,br){return `<div class="row"><span class="sw" style="background:${c};${br?'border:1px solid var(--line)':''}"></span>${t}</div>`;}
function bivarLegend(){
  let cells='';
  // 행: 고령화 A3(위)→A1(아래), 열: 접근성 B1(좌)→B3(우)
  const rows=[['yl','고령화→'],['A3'],['A2'],['A1']];
  let html='<div class="bivar-grid">';
  html+='<div></div><div class="axt">좋음</div><div class="axt"></div><div class="axt">나쁨</div>';
  ['A3','A2','A1'].forEach(a=>{
    html+= a==='A2'?'<div class="yl">고령화</div>':'<div></div>';
    ['B1','B2','B3'].forEach(b=>{html+=`<div class="cell" style="background:${BIVAR[a+b]}"></div>`;});
  });
  html+='</div><div class="axt" style="text-align:center">← 병원 접근성 →</div>';
  return html;
}

/* ---------- 클릭형 등시선(ORS) ---------- */
function clearClickIso(){
  if(map.getSource('clickiso')) map.getSource('clickiso').setData({type:'FeatureCollection',features:[]});
  if(clickMarker){clickMarker.remove();clickMarker=null;}
}
async function fetchClickIso(lng,lat){
  if(!KEYS.ors){toast('config.js의 ors 키를 설정하세요');return;}
  if(clickBusy) return; clickBusy=true;
  toast('등시선을 불러오는 중…');
  if(clickMarker) clickMarker.remove();
  clickMarker=new maplibregl.Marker({color:'#111'}).setLngLat([lng,lat]).addTo(map);
  try{
    const r=await fetch('https://api.openrouteservice.org/v2/isochrones/driving-car',{
      method:'POST',headers:{Authorization:KEYS.ors,'Content-Type':'application/json'},
      body:JSON.stringify({locations:[[lng,lat]],range:[900,1800,2700,3600],range_type:'time'})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const gj=await r.json();
    const feats=(gj.features||[]).slice()
      .sort((a,b)=>(b.properties.value||0)-(a.properties.value||0)) // 큰 밴드 아래, 작은 밴드 위
      .map(f=>({...f,properties:{...f.properties,minutes:(f.properties.value||0)/60}}));
    map.getSource('clickiso').setData({type:'FeatureCollection',features:feats});
    toast(feats.length?'클릭 지점 등시선 완료':'등시선 결과가 없습니다');
  }catch(e){toast('ORS 호출 실패: '+e.message);}
  finally{clickBusy=false;}
}

/* ---------- 인터랙션 ---------- */
const pop=new maplibregl.Popup({closeButton:false,closeOnClick:false,offset:10});
function wireInteractions(){
  map.on('click',e=>{ if(view==='here') fetchClickIso(e.lngLat.lng,e.lngLat.lat); });
  map.on('mouseenter','hosp-pt',e=>{map.getCanvas().style.cursor='pointer';
    const p=e.features[0].properties;
    pop.setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<div class="pop-name">${p.name}</div><div class="pop-meta">${p.region} · ${p.sido}</div>`).addTo(map);});
  map.on('mouseleave','hosp-pt',()=>{map.getCanvas().style.cursor='';pop.remove();});

  ['sgg-aging','sgg-bivar'].forEach(lid=>{
    map.on('mousemove',lid,e=>{const p=e.features[0].properties;
      let extra=`<div><span class="pop-k">고령화지수</span> <span class="pop-v">${p.aging_index??'-'}</span></div>`;
      if(view==='bivar'){
        if(p.access_min!=null) extra+=`<div><span class="pop-k">최근접 상급종합</span> <span class="pop-v">${p.access_min}분</span></div>`;
        else if(p.access_label) extra+=`<div><span class="pop-k">접근성</span> <span class="pop-v">${p.access_label}</span></div>`;
        extra+=`<div><span class="pop-k">관내 종합병원</span> <span class="pop-v">${p.hosp_gen_cnt??0}개</span></div>`;
      }
      pop.setLngLat(e.lngLat).setHTML(`<div class="pop-name">${(p.sido||'')} ${p.name}</div>${extra}`).addTo(map);});
    map.on('mouseleave',lid,()=>pop.remove());
  });
}

/* ---------- 이벤트 ---------- */
document.getElementById('view-seg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#view-seg button').forEach(x=>x.classList.toggle('on',x===b));
  view=b.dataset.view; applyView();
  map.getCanvas().style.cursor=view==='here'?'crosshair':'';
});
document.getElementById('basemap').addEventListener('change',e=>{
  const id=e.target.value, st=basemapStyle(id);
  if(!st){toast('VWorld 키가 없습니다. config.js에 vworld 키를 넣고 도메인을 등록하세요.');
    e.target.value='carto-positron';return;}
  clearClickIso();   // 배경지도 전환 시 클릭 등시선/마커 동반 초기화(불일치 방지)
  map.setStyle(st);
});
document.getElementById('toggle-hosp').addEventListener('change',applyHospToggle);
document.getElementById('opacity').addEventListener('input',e=>{
  const o=+e.target.value/100;
  ['iso-fill','sgg-aging','sgg-bivar','clickiso-fill'].forEach(l=>{if(map.getLayer(l))map.setPaintProperty(l,'fill-opacity',o);});
});

(async()=>{
  await loadData();                       // 데이터 먼저 로드 → style.load 시 레이어 보장
  map=new maplibregl.Map({container:'map',style:basemapStyle('carto-positron'),
    center:[127.8,36.3],zoom:6.4,minZoom:5,maxZoom:14});
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');
  map.addControl(new maplibregl.ScaleControl({maxWidth:120,unit:'metric'}),'bottom-right');
  map.on('style.load',addAppLayers);      // 배경지도 전환 때마다 재구성
  wireInteractions();
  const n=DATA.hosp&&DATA.hosp.features?DATA.hosp.features.length:0;
  if(n) document.getElementById('badge-hosp').textContent=`병원 ${n}개소 · 제5기+α`;
  document.querySelector('.badge#badge-ctx').textContent =
    (DATA.iso?'자동차 운전':'등시선 데이터 없음');
})();
</script>
</body>
